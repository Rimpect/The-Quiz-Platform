name: Deploy frontend from client folder

on:
  push:
    branches: ["main"]
    # Опционально: запускать развертывание, только если изменилась папка client
    paths:
      - "client/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload client folder as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Указываем путь к вашей папке с фронтендом
          path: client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
